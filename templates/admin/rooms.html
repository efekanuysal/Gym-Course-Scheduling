<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Rooms</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="assets/toolkit/styles/toolkit.css">
    <link rel="stylesheet" href="assets/toolkit/styles/bootstrap.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:100,300,400,700|Roboto:100,100i,300,300i,400,400i,500,500i,700,700i,900,900i&subset=latin-ext" rel="stylesheet">
    <script src="assets/toolkit/scripts/toolkit.js"></script>
</head>
<body>
    <div class="header">
        <h1>Metu Gym Portal - Admin</h1>
    </div>

    <div class="scrollHeader">
        <table class="Bar">
            <tr>
                <th>
                    <a href="/admin/dashboard" class="Item">
                        <h3><u>Dashboard</u></h3>
                    </a>
                </th>
                <th>
                    <a href="/admin/users" class="Item">
                        <h3><u>Users</u></h3>
                    </a>
                </th>
                <th>
                    <a href="/admin/courses" class="Item">
                        <h3><u>Courses</u></h3>
                    </a>
                </th>
                <th>
                    <a href="/admin/rooms" class="Item">
                        <h3><u>Rooms</u></h3>
                    </a>
                </th>
                <th>
                    <a href="/admin/schedules" class="Item">
                        <h3><u>Schedules</u></h3>
                    </a>
                </th>
                <th>
                    <a href="/register" class="Item">
                        <h3><u>Register User</u></h3>
                    </a>
                </th>
                <th>
                    <a href="/booking_admin" class="Item">
                        <h3><u>Book Session</u></h3>
                    </a>
                </th>
                <th>
                    <a href="/add_instructor" class="Item">
                        <h3><u>Add Instructor</u></h3>
                    </a>
                </th>
                <th>
                    <a href="/add_class" class="Item">
                        <h3><u>Add Class</u></h3>
                    </a>
                </th>
                <th>
                    <a href="/remove_member" class="Item">
                        <h3><u>Remove Member</u></h3>
                    </a>
                </th>
                <th>
                    <a href="/logout" class="Item">
                        <h3><u>Logout</u></h3>
                    </a>
                </th>
            </tr>
        </table>
    </div>

    <div class="CenterArea" style="padding: 15px; width: 60%; margin: auto; margin-top: 50px;">
        <h2 style="color:#cf0a2c; text-align: center; margin-bottom: 20px;">Facility Rooms</h2>

        <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; text-align: left; background-color: white;">
                <thead style="background-color: #cf0a2c; color: white;">
                    <tr>
                        <th style="padding: 12px; border: 1px solid #ddd;">Room ID</th>
                        <th style="padding: 12px; border: 1px solid #ddd;">Room Name</th>
                    </tr>
                </thead>
                <tbody>
                    {% for room in rooms %}
                    <tr>
                        <td style="padding: 12px; border: 1px solid #ddd; color: #333;">{{ room.ID }}</td>
                        <td style="padding: 12px; border: 1px solid #ddd; color: #333;">{{ room.roomName }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
